<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Theo Model — Theo OS</title>
  <link rel="icon" href="/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/css/admin.css">
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theo_os_theme') || 'dark')</script>
  <style>
    .model-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
    .model-col { }
    .model-col-title { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
    .memory-card { background: var(--void-elevated); border: 1px solid var(--border-ghost); border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; }
    .memory-content { font-size: 13px; color: var(--text-primary); margin-bottom: 10px; line-height: 1.5; }
    .memory-content[contenteditable="true"] { outline: 1px solid var(--teal); border-radius: 3px; padding: 2px 4px; }
    .memory-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .conf-bar { flex: 1; height: 3px; background: var(--border-ghost); border-radius: 2px; }
    .conf-fill { height: 100%; border-radius: 2px; background: var(--teal); transition: width 0.3s; }
    .conf-fill.low { background: var(--coral); }
    .conf-fill.mid { background: #f5c842; }
    .source-badge { font-family: var(--font-mono); font-size: 9px; color: var(--text-tertiary); letter-spacing: 0.05em; }
    .memory-date { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); }
    .memory-actions { display: flex; gap: 8px; }
    .mem-btn { background: none; border: 1px solid var(--border-ghost); border-radius: 4px; font-size: 10px; font-family: var(--font-mono); color: var(--text-secondary); cursor: pointer; padding: 3px 8px; transition: all 0.15s; }
    .mem-btn:hover { border-color: var(--teal); color: var(--teal); }
    .mem-btn.danger:hover { border-color: var(--coral); color: var(--coral); }
    .add-memory-form { margin-bottom: 16px; display: flex; flex-direction: column; gap: 8px; }
    .add-memory-input { background: var(--void-elevated); border: 1px solid var(--border-ghost); border-radius: 6px; padding: 8px 10px; font-size: 12px; font-family: var(--font-body); color: var(--text-primary); resize: none; }
    .add-memory-input:focus { outline: none; border-color: var(--teal); }
    .add-memory-btn { align-self: flex-end; background: none; border: 1px solid var(--border-subtle); border-radius: 6px; padding: 5px 12px; font-size: 11px; font-family: var(--font-mono); color: var(--teal); cursor: pointer; }
    .add-memory-btn:hover { background: var(--teal-subtle); }
    @media (max-width: 900px) { .model-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="shell">
  <nav class="sidebar">
    <div class="sidebar-logo">THEO OS</div>

    <div class="sidebar-label">Overview</div>
    <a href="/admin/dashboard.html" class="sidebar-link">Dashboard</a>
    <a href="/admin/capture.html" class="sidebar-link">Quick Capture</a>

    <div class="sidebar-label">Life</div>
    <a href="/admin/tasks.html" class="sidebar-link">Tasks</a>
    <a href="/admin/goals.html" class="sidebar-link">Goals</a>
    <a href="/admin/people.html" class="sidebar-link">People</a>
    <a href="/admin/collections.html" class="sidebar-link">Collections</a>

    <div class="sidebar-label">Mind</div>
    <a href="/admin/journal.html" class="sidebar-link">Journal</a>
    <a href="/admin/vision.html" class="sidebar-link">Life Vision</a>
    <a href="/admin/review.html" class="sidebar-link">Weekly Review</a>

    <div class="sidebar-label">Inbox</div>
    <a href="/admin/email.html" class="sidebar-link">Email Triage</a>

    <div class="sidebar-label">Intelligence</div>
    <a href="/admin/chat.html" class="sidebar-link">Chat</a>
    <a href="/admin/model.html" class="sidebar-link active">The Theo Model</a>

    <div class="sidebar-label" style="margin-top:24px">Account</div>
    <button class="theme-toggle" id="theme-toggle"></button>
    <a href="#" class="sidebar-link" id="logout-btn">Sign out</a>
  </nav>

  <main class="main">
    <div class="topbar">
      <div>
        <h1 class="page-title">The Theo Model</h1>
        <p style="font-size:13px; color:var(--text-tertiary); margin-top:4px; font-family:var(--font-mono);">What the system has learned. Edit, correct, or delete anything.</p>
      </div>
    </div>

    <div class="model-grid" id="model-grid">
      <div class="model-col" id="col-fact"></div>
      <div class="model-col" id="col-pattern"></div>
      <div class="model-col" id="col-preference"></div>
    </div>
  </main>
</div>

<script src="/admin/js/auth.js"></script>
<script>
  requireAuth();

  document.getElementById('logout-btn').addEventListener('click', e => {
    e.preventDefault();
    clearToken();
    window.location.href = '/admin/index.html';
  });

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function confColor(c) {
    if (c >= 0.7) return '';
    if (c >= 0.4) return 'mid';
    return 'low';
  }

  function fmtDate(ts) {
    if (!ts) return '';
    return new Date(ts.replace(' ','T')+'Z').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  function renderCol(type, label, memories) {
    const col = document.getElementById(`col-${type}`);
    const cards = memories.map(m => `
      <div class="memory-card" data-id="${m.id}">
        <div class="memory-content" data-field="content">${esc(m.content)}</div>
        <div class="memory-meta">
          <div class="conf-bar"><div class="conf-fill ${confColor(m.confidence)}" style="width:${Math.round(m.confidence*100)}%"></div></div>
          <span class="source-badge">${esc(m.source || 'chat')}</span>
          <span class="memory-date">${fmtDate(m.last_reinforced)}</span>
        </div>
        <div class="memory-actions">
          <button class="mem-btn" data-action="edit">Edit</button>
          <button class="mem-btn" data-action="boost">Boost</button>
          <button class="mem-btn" data-action="suppress">Suppress</button>
          <button class="mem-btn danger" data-action="delete">Delete</button>
        </div>
      </div>
    `).join('');

    col.innerHTML = `
      <div class="model-col-title">${label} <span>${memories.length}</span></div>
      <div class="add-memory-form">
        <textarea class="add-memory-input" id="add-${type}" rows="2" placeholder="Add a ${label.toLowerCase()}..."></textarea>
        <button class="add-memory-btn" data-type="${type}">+ Add</button>
      </div>
      ${cards}
    `;
  }

  async function load() {
    const data = await apiGet('/api/theo-os/memories');
    const all = data?.memories || [];
    renderCol('fact', 'Facts', all.filter(m => m.type === 'fact'));
    renderCol('pattern', 'Patterns', all.filter(m => m.type === 'pattern'));
    renderCol('preference', 'Preferences', all.filter(m => m.type === 'preference'));
    attachHandlers();
  }

  function attachHandlers() {
    document.querySelectorAll('.add-memory-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const type = btn.dataset.type;
        const ta = document.getElementById(`add-${type}`);
        const content = ta.value.trim();
        if (!content) return;
        await apiPost('/api/theo-os/memories', { type, content });
        ta.value = '';
        load();
      });
    });

    document.querySelectorAll('.memory-card').forEach(card => {
      const id = Number(card.dataset.id);
      card.querySelectorAll('.mem-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const action = btn.dataset.action;
          if (action === 'delete') {
            if (!confirm('Delete this memory?')) return;
            await apiFetch(`/api/theo-os/memories/${id}`, { method: 'DELETE' });
            load();
          } else if (action === 'boost') {
            const confFill = card.querySelector('.conf-fill');
            const current = parseFloat(confFill.style.width) / 100;
            await apiFetch(`/api/theo-os/memories/${id}`, {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ confidence: Math.min(1.0, current + 0.2) })
            });
            load();
          } else if (action === 'suppress') {
            await apiFetch(`/api/theo-os/memories/${id}`, {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ confidence: 0.1 })
            });
            load();
          } else if (action === 'edit') {
            const contentEl = card.querySelector('.memory-content');
            contentEl.contentEditable = 'true';
            contentEl.focus();
            btn.textContent = 'Save';
            btn.dataset.action = 'save';
          } else if (action === 'save') {
            const contentEl = card.querySelector('.memory-content');
            contentEl.contentEditable = 'false';
            await apiFetch(`/api/theo-os/memories/${id}`, {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ content: contentEl.textContent.trim() })
            });
            btn.textContent = 'Edit';
            btn.dataset.action = 'edit';
          }
        });
      });
    });
  }

  load();
</script>
</body>
</html>
