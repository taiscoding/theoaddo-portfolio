<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Journal — Theo OS</title>
  <link rel="icon" href="/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/css/admin.css?v=4">
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theo_os_theme') || 'dark')</script>
  <style>
    .journal-layout {
      max-width: 720px;
    }

    /* New entry form */
    .new-entry-form {
      background: var(--bg-card, var(--void-elevated));
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 28px;
    }

    .entry-textarea {
      width: 100%;
      background: var(--void-surface);
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      padding: 12px 14px;
      font-size: 14px;
      font-family: var(--font-mono);
      color: var(--text-primary);
      outline: none;
      resize: none;
      min-height: 120px;
      line-height: 1.7;
      transition: border-color 0.2s;
      overflow: hidden;
    }
    .entry-textarea:focus { border-color: var(--teal); }
    .entry-textarea::placeholder { color: var(--text-tertiary); }

    .form-row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      align-items: center;
    }

    .tags-input {
      flex: 1;
      background: var(--void-surface);
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      padding: 9px 14px;
      font-size: 13px;
      font-family: var(--font-mono);
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s;
    }
    .tags-input:focus { border-color: var(--teal); }
    .tags-input::placeholder { color: var(--text-tertiary); }

    /* Search row */
    .search-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      align-items: center;
    }

    .search-input {
      flex: 1;
      background: var(--void-surface);
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      padding: 9px 14px;
      font-size: 13px;
      font-family: var(--font-body);
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--teal); }
    .search-input::placeholder { color: var(--text-tertiary); }

    .tag-select {
      background: var(--void-surface);
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      padding: 9px 14px;
      font-size: 13px;
      font-family: var(--font-mono);
      color: var(--text-secondary);
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
      min-width: 160px;
    }
    .tag-select:focus { border-color: var(--teal); }

    /* Entry cards */
    .entry-card {
      background: var(--bg-card, var(--void-elevated));
      border: 1px solid var(--border-ghost);
      border-radius: 10px;
      padding: 20px 22px;
      margin-bottom: 14px;
      transition: border-color 0.2s;
    }
    .entry-card:hover { border-color: var(--border-subtle); }

    .entry-date {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 12px;
    }

    .entry-content {
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.75;
      color: var(--text-primary);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .entry-footer {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .tag-pill {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.05em;
      padding: 3px 9px;
      border-radius: 20px;
      border: 1px solid var(--teal);
      color: var(--teal);
      text-transform: lowercase;
    }

    .entry-actions {
      display: flex;
      gap: 6px;
      margin-left: auto;
    }

    .btn-icon {
      background: none;
      border: 1px solid var(--border-subtle);
      color: var(--text-tertiary);
      border-radius: 5px;
      padding: 4px 10px;
      font-size: 12px;
      font-family: var(--font-mono);
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-icon:hover { color: var(--text-secondary); border-color: var(--border-subtle); }
    .btn-icon.delete-btn:hover { color: var(--coral); border-color: var(--coral); }

    /* Inline edit mode */
    .edit-content-area {
      width: 100%;
      background: var(--void-surface);
      border: 1px solid var(--teal);
      border-radius: 6px;
      padding: 12px 14px;
      font-size: 13px;
      font-family: var(--font-mono);
      color: var(--text-primary);
      outline: none;
      resize: none;
      min-height: 120px;
      line-height: 1.75;
      overflow: hidden;
    }

    .edit-tags-input {
      width: 100%;
      background: var(--void-surface);
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      padding: 9px 14px;
      font-size: 13px;
      font-family: var(--font-mono);
      color: var(--text-primary);
      outline: none;
      margin-top: 8px;
      transition: border-color 0.2s;
    }
    .edit-tags-input:focus { border-color: var(--teal); }
    .edit-tags-input::placeholder { color: var(--text-tertiary); }

    .edit-actions {
      display: flex;
      gap: 6px;
      margin-top: 10px;
      justify-content: flex-end;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-tertiary);
    }

    /* Buttons */
    .btn-sm {
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 12px;
      font-family: var(--font-mono);
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s;
      letter-spacing: 0.04em;
    }
    .btn-sm:hover { opacity: 0.85; }
    .btn-sm:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary {
      background: var(--teal);
      color: #000;
    }
    .btn-ghost {
      background: none;
      border: 1px solid var(--border-subtle);
      color: var(--text-secondary);
    }
    .btn-ghost:hover { border-color: var(--border-subtle); background: var(--void-elevated); opacity: 1; }
  </style>
</head>
<body>
<div class="shell">
  <nav class="sidebar">
    <div class="sidebar-logo">THEO OS</div>

    <div class="sidebar-label">Overview</div>
    <a href="/admin/dashboard.html" class="sidebar-link">Dashboard</a>
    <a href="/admin/capture.html" class="sidebar-link">Quick Capture</a>

    <div class="sidebar-label">Life</div>
    <a href="/admin/tasks.html" class="sidebar-link">Tasks</a>
    <a href="/admin/goals.html" class="sidebar-link">Goals</a>
    <a href="/admin/people.html" class="sidebar-link">People</a>
    <a href="/admin/collections.html" class="sidebar-link">Collections</a>

    <div class="sidebar-label">Mind</div>
    <a href="/admin/journal.html" class="sidebar-link active">Journal</a>
    <a href="/admin/vision.html" class="sidebar-link">Life Vision</a>
    <a href="/admin/review.html" class="sidebar-link">Weekly Review</a>

    <div class="sidebar-label">Inbox</div>
    <a href="/admin/email.html" class="sidebar-link">Email Triage</a>

    <div class="sidebar-label">Intelligence</div>
    <a href="/admin/chat.html" class="sidebar-link">Chat</a>
    <a href="/admin/model.html" class="sidebar-link">The Theo Model</a>
    <a href="/admin/knowledge.html" class="sidebar-link">Knowledge</a>
    <a href="/admin/learn.html" class="sidebar-link">Learn</a>
    <a href="/admin/graph.html" class="sidebar-link">Knowledge Graph</a>

    <div class="sidebar-label" style="margin-top:24px">Account</div>
    <button class="theme-toggle" id="theme-toggle"></button>
    <a href="#" class="sidebar-link" id="logout-btn">Sign out</a>
  </nav>

  <main class="main">
    <div class="topbar">
      <div>
        <h1 class="page-title">Journal</h1>
        <p style="font-size:13px; color:var(--text-tertiary); margin-top:4px; font-family:var(--font-mono);">Write freely. The system listens.</p>
      </div>
    </div>

    <div class="journal-layout">

      <!-- New entry form -->
      <div class="new-entry-form">
        <textarea
          class="entry-textarea"
          id="new-content"
          placeholder="What's on your mind?"
          rows="4"
        ></textarea>
        <div class="form-row">
          <input
            class="tags-input"
            type="text"
            id="new-tags"
            placeholder="Tags (comma-separated)"
            autocomplete="off"
          >
          <button class="btn-sm btn-primary" id="save-entry-btn">Save Entry</button>
        </div>
      </div>

      <!-- Search row -->
      <div class="search-row">
        <input
          class="search-input"
          type="text"
          id="search-input"
          placeholder="Search entries..."
          autocomplete="off"
        >
        <select class="tag-select" id="tag-select">
          <option value="">All tags</option>
        </select>
      </div>

      <!-- Entry list -->
      <div id="entry-list"></div>

    </div>
  </main>
</div>

<script src="/admin/js/auth.js?v=3"></script>
<script>
  requireAuth();

  document.getElementById('logout-btn').addEventListener('click', e => {
    e.preventDefault();
    clearToken();
    window.location.href = '/admin/index.html';
  });

  // ---- Helpers ----

  function esc(s) {
    return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function autoExpand(el) {
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
  }

  function formatDate(isoStr) {
    const date = new Date(isoStr);
    const now = new Date();
    const todayStr = now.toDateString();
    const yestDate = new Date(now);
    yestDate.setDate(now.getDate() - 1);
    const yestStr = yestDate.toDateString();

    if (date.toDateString() === todayStr) return 'Today';
    if (date.toDateString() === yestStr) return 'Yesterday';

    return date.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  }

  function parseTags(tagsStr) {
    if (!tagsStr) return [];
    return tagsStr.split(',').map(t => t.trim()).filter(Boolean);
  }

  // ---- State ----
  let allEntries = [];
  let searchQuery = '';
  let activeTag = '';
  let searchTimer = null;

  // ---- Load ----

  async function loadEntries() {
    const params = new URLSearchParams();
    if (searchQuery) params.set('q', searchQuery);
    if (activeTag) params.set('tag', activeTag);

    const path = '/api/theo-os/journal' + (params.toString() ? '?' + params.toString() : '');
    const data = await apiGet(path);
    allEntries = data || [];
    renderEntries();
    populateTagSelect();
  }

  // ---- Tag select ----

  function populateTagSelect() {
    const tagSet = new Set();
    allEntries.forEach(e => parseTags(e.tags).forEach(t => tagSet.add(t)));

    const select = document.getElementById('tag-select');
    const current = select.value;

    select.innerHTML = '<option value="">All tags</option>';
    [...tagSet].sort().forEach(tag => {
      const opt = document.createElement('option');
      opt.value = tag;
      opt.textContent = tag;
      if (tag === current) opt.selected = true;
      select.appendChild(opt);
    });
  }

  // ---- Render ----

  function renderEntries() {
    const list = document.getElementById('entry-list');

    if (allEntries.length === 0) {
      list.innerHTML = '<div class="empty-state">Nothing written yet. Use the field above to log a thought.</div>';
      return;
    }

    list.innerHTML = allEntries.map(entry => {
      const tags = parseTags(entry.tags);
      const tagPills = tags.map(t => `<span class="tag-pill">${esc(t)}</span>`).join('');
      const hasFooterContent = tags.length > 0;

      return `<div class="entry-card" data-id="${entry.id}">
        <div class="entry-date">${esc(formatDate(entry.created_at))}</div>
        <div class="entry-content read-mode">${esc(entry.content)}</div>
        <div class="entry-footer">
          ${hasFooterContent ? `<div class="tag-pills-wrap" style="display:flex;gap:6px;flex-wrap:wrap;">${tagPills}</div>` : ''}
          <div class="entry-actions">
            <button class="btn-icon edit-btn" aria-label="Edit entry">Edit</button>
            <button class="btn-icon delete-btn" aria-label="Delete entry">&#x2715;</button>
          </div>
        </div>
      </div>`;
    }).join('');

    // Attach events
    list.querySelectorAll('.entry-card').forEach(card => {
      const id = Number(card.dataset.id);

      card.querySelector('.edit-btn').addEventListener('click', () => enterEditMode(card, id));
      card.querySelector('.delete-btn').addEventListener('click', () => deleteEntry(id, card));
    });
  }

  // ---- Inline edit mode ----

  function enterEditMode(card, id) {
    const entry = allEntries.find(e => e.id === id);
    if (!entry) return;

    const contentEl = card.querySelector('.entry-content');
    const footer = card.querySelector('.entry-footer');

    // Replace content with textarea
    contentEl.innerHTML = `<textarea class="edit-content-area" id="edit-content-${id}">${esc(entry.content)}</textarea>
      <input class="edit-tags-input" type="text" id="edit-tags-${id}" value="${esc(entry.tags || '')}" placeholder="Tags (comma-separated)">
      <div class="edit-actions">
        <button class="btn-sm btn-ghost cancel-edit-btn">Cancel</button>
        <button class="btn-sm btn-primary save-edit-btn">Save</button>
      </div>`;

    // Hide footer while editing
    footer.style.display = 'none';

    const ta = card.querySelector('.edit-content-area');
    autoExpand(ta);
    ta.addEventListener('input', () => autoExpand(ta));
    ta.focus();

    card.querySelector('.cancel-edit-btn').addEventListener('click', () => {
      exitEditMode(card, entry);
    });

    card.querySelector('.save-edit-btn').addEventListener('click', async () => {
      const newContent = ta.value.trim();
      if (!newContent) { ta.focus(); return; }

      const saveBtn = card.querySelector('.save-edit-btn');
      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving...';

      try {
        const newTags = card.querySelector('.edit-tags-input').value;
        const updated = await apiPatch(`/api/theo-os/journal/${id}`, {
          content: newContent,
          tags: newTags
        });

        if (updated) {
          const idx = allEntries.findIndex(e => e.id === id);
          if (idx !== -1) allEntries[idx] = updated;
          renderEntries();
        } else {
          saveBtn.disabled = false;
          saveBtn.textContent = 'Save';
        }
      } catch {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save';
      }
    });
  }

  function exitEditMode(card, entry) {
    const contentEl = card.querySelector('.entry-content');
    const footer = card.querySelector('.entry-footer');

    contentEl.innerHTML = esc(entry.content);
    footer.style.display = '';
  }

  // ---- Delete ----

  async function deleteEntry(id, card) {
    if (!confirm('Delete this entry? This cannot be undone.')) return;

    const ok = await apiDelete(`/api/theo-os/journal/${id}`);
    if (ok) {
      allEntries = allEntries.filter(e => e.id !== id);
      renderEntries();
      populateTagSelect();
    }
  }

  // ---- New entry ----

  const newContentEl = document.getElementById('new-content');
  newContentEl.addEventListener('input', () => autoExpand(newContentEl));

  document.getElementById('save-entry-btn').addEventListener('click', async () => {
    const content = newContentEl.value.trim();
    if (!content) { newContentEl.focus(); return; }

    const saveBtn = document.getElementById('save-entry-btn');
    saveBtn.disabled = true;
    saveBtn.textContent = 'Saving...';

    try {
      const tags = document.getElementById('new-tags').value;
      const created = await apiPost('/api/theo-os/journal', { content, tags });

      if (created) {
        allEntries.unshift(created);
        newContentEl.value = '';
        newContentEl.style.height = '';
        document.getElementById('new-tags').value = '';
        renderEntries();
        populateTagSelect();
      }
    } finally {
      saveBtn.disabled = false;
      saveBtn.textContent = 'Save Entry';
    }
  });

  // ---- Search (debounced) ----

  document.getElementById('search-input').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      searchQuery = e.target.value.trim();
      loadEntries();
    }, 350);
  });

  // ---- Tag filter ----

  document.getElementById('tag-select').addEventListener('change', e => {
    activeTag = e.target.value;
    loadEntries();
  });

  // ---- Init ----
  loadEntries();

  // Cmd+K capture overlay
  (function() {
    const overlay = document.getElementById('capture-overlay');
    const captureInput = document.getElementById('capture-input');
    const captureHint = document.getElementById('capture-hint');
    function openCapture() {
      overlay.classList.add('open');
      captureInput.value = '';
      captureHint.textContent = '↵ to capture · Esc to close';
      captureInput.focus();
    }
    function closeCapture() { overlay.classList.remove('open'); captureInput.value = ''; }
    document.addEventListener('keydown', e => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); overlay.classList.contains('open') ? closeCapture() : openCapture(); }
      if (e.key === 'Escape' && overlay.classList.contains('open')) closeCapture();
    });
    overlay.addEventListener('click', e => { if (e.target === overlay) closeCapture(); });
    captureInput.addEventListener('keydown', async e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        const text = captureInput.value.trim();
        if (!text) return;
        captureHint.textContent = 'Saving...';
        try {
          const data = await apiPost('/api/theo-os/capture', { text });
          captureHint.textContent = (data && data.message) ? data.message : 'Captured.';
          captureInput.value = '';
          setTimeout(() => closeCapture(), 1500);
        } catch { captureHint.textContent = 'Failed to save — check connection.'; }
      }
    });
  })();

</script>

<!-- Cmd+K capture overlay -->
<div class="capture-overlay" id="capture-overlay">
  <div class="capture-box">
    <textarea class="capture-input" id="capture-input"
      placeholder="Capture anything — task, goal, idea, person, reminder, restaurant..." rows="2"></textarea>
    <div class="capture-hint" id="capture-hint">↵ to capture · Esc to close</div>
  </div>
</div>
</body>
</html>
