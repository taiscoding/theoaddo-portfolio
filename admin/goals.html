<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goals — Theo OS</title>
  <link rel="icon" href="/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/css/admin.css?v=2">
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theo_os_theme') || 'dark')</script>
  <style>
    /* Filter pills */
    .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .filter-pill {
      font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em;
      text-transform: uppercase; padding: 5px 12px; border-radius: 20px;
      border: 1px solid var(--border-subtle); background: none;
      color: var(--text-tertiary); cursor: pointer; transition: all 0.2s;
    }
    .filter-pill:hover { color: var(--text-secondary); border-color: var(--border-subtle); }
    .filter-pill.active { background: var(--teal-subtle); color: var(--teal); border-color: var(--teal); }

    /* Goals grid */
    .goals-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 24px;
    }
    @media (max-width: 1100px) { .goals-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 720px) { .goals-grid { grid-template-columns: 1fr; } }

    /* Goal card */
    .goal-card {
      background: var(--void-elevated);
      border: 1px solid var(--border-ghost);
      border-radius: 10px;
      padding: 18px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.1s;
    }
    .goal-card:hover { border-color: var(--border-subtle); transform: translateY(-1px); }

    .goal-card-top {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 8px; margin-bottom: 10px;
    }

    .area-badge {
      display: inline-block; font-family: var(--font-mono); font-size: 10px;
      padding: 2px 7px; border-radius: 3px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .area-teal { background: var(--teal-subtle); color: var(--teal); }
    .area-coral { background: rgba(255,138,101,0.12); color: var(--coral); }
    .area-purple { background: rgba(187,143,206,0.12); color: var(--purple); }
    .area-slate { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.45); }

    .status-badge {
      display: inline-block; font-family: var(--font-mono); font-size: 10px;
      padding: 2px 7px; border-radius: 3px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap;
    }
    .status-active { background: var(--teal-subtle); color: var(--teal); }
    .status-paused { background: rgba(245,200,66,0.15); color: #f5c842; }
    .status-achieved { background: rgba(34,197,94,0.12); color: #22c55e; }
    .status-abandoned { background: rgba(255,255,255,0.06); color: var(--text-muted, rgba(255,255,255,0.3)); }

    .goal-title {
      font-size: 15px; font-weight: 600; color: var(--text-primary);
      margin-bottom: 8px; line-height: 1.4;
    }

    .goal-target {
      font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary);
      margin-bottom: 12px; letter-spacing: 0.03em;
    }

    /* Milestone progress bar */
    .milestone-progress { margin-top: 4px; }
    .milestone-label {
      font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary);
      margin-bottom: 5px; letter-spacing: 0.03em;
    }
    .progress-track {
      height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: var(--teal); border-radius: 2px;
      transition: width 0.3s ease;
    }

    /* Empty state */
    .empty-state {
      grid-column: 1 / -1; text-align: center;
      padding: 60px 20px; color: var(--text-tertiary);
      font-size: 14px;
    }

    /* ---- Drawer ---- */
    .drawer-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.55);
      z-index: 100; display: none; backdrop-filter: blur(2px);
    }
    .drawer-backdrop.open { display: block; }

    .drawer {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: 420px; max-width: 100vw;
      background: var(--void-elevated);
      border-left: 1px solid var(--border-subtle);
      z-index: 101;
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
    }
    .drawer.open { transform: translateX(0); }

    .drawer-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border-ghost);
      flex-shrink: 0;
    }
    .drawer-close {
      position: absolute; top: 16px; right: 18px;
      background: none; border: none; color: var(--text-tertiary);
      cursor: pointer; font-size: 20px; line-height: 1;
      padding: 4px 8px; border-radius: 4px; transition: color 0.2s;
    }
    .drawer-close:hover { color: var(--text-primary); }

    .drawer-body {
      flex: 1; overflow-y: auto; padding: 20px 24px;
    }

    .drawer-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border-ghost);
      flex-shrink: 0;
      display: flex; gap: 10px; align-items: center;
    }

    /* Form fields inside drawer */
    .form-field { margin-bottom: 16px; }
    .form-label {
      display: block; font-family: var(--font-mono); font-size: 11px;
      letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-tertiary);
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%; background: var(--void-surface); border: 1px solid var(--border-subtle);
      border-radius: 6px; padding: 9px 12px; font-size: 14px; color: var(--text-primary);
      font-family: var(--font-body); outline: none; transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--teal); }
    textarea.form-input { resize: vertical; min-height: 80px; }

    .drawer-title-input {
      width: 100%; background: none; border: none; outline: none;
      font-size: 20px; font-weight: 700; font-family: var(--font-display);
      color: var(--text-primary); padding: 0; margin-bottom: 16px;
      border-bottom: 1px solid transparent; transition: border-color 0.2s;
    }
    .drawer-title-input:focus { border-bottom-color: var(--teal); }

    .drawer-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* Milestones section */
    .milestones-section { margin-top: 24px; }
    .milestones-header {
      font-family: var(--font-mono); font-size: 11px; font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-tertiary);
      margin-bottom: 12px;
    }

    .milestone-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px; border-radius: 6px;
      border: 1px solid var(--border-ghost);
      margin-bottom: 6px; background: var(--void-surface);
      transition: border-color 0.15s;
    }
    .milestone-item:hover { border-color: var(--border-subtle); }
    .milestone-item.done .milestone-title { text-decoration: line-through; color: var(--text-tertiary); }

    .milestone-check {
      width: 16px; height: 16px; flex-shrink: 0;
      border: 1.5px solid var(--border-subtle); border-radius: 3px;
      background: none; cursor: pointer; display: flex; align-items: center;
      justify-content: center; transition: all 0.15s; appearance: none;
      -webkit-appearance: none;
    }
    .milestone-check:checked {
      background: var(--teal); border-color: var(--teal);
    }
    .milestone-check:checked::after {
      content: '';
      display: block;
      width: 8px; height: 5px;
      border-left: 1.5px solid #000;
      border-bottom: 1.5px solid #000;
      transform: rotate(-45deg) translateY(-1px);
    }

    .milestone-info { flex: 1; min-width: 0; }
    .milestone-title {
      font-size: 13px; color: var(--text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .milestone-due {
      font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary);
      margin-top: 2px; letter-spacing: 0.03em;
    }

    .milestone-del {
      background: none; border: none; color: var(--text-tertiary);
      cursor: pointer; font-size: 16px; line-height: 1; padding: 2px 6px;
      border-radius: 4px; transition: color 0.15s; flex-shrink: 0;
    }
    .milestone-del:hover { color: var(--coral); }

    /* Add milestone form */
    .add-milestone-form {
      display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap;
    }
    .add-milestone-form .form-input { font-size: 13px; padding: 7px 10px; }
    .add-milestone-form .m-title { flex: 1; min-width: 120px; }
    .add-milestone-form .m-date { width: 140px; }

    .btn-sm {
      font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em;
      text-transform: uppercase; padding: 7px 14px; border-radius: 6px;
      border: 1px solid var(--border-subtle); background: none;
      color: var(--text-secondary); cursor: pointer; transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-sm:hover { color: var(--text-primary); border-color: var(--border-subtle); }
    .btn-primary {
      background: var(--teal); color: #000; border-color: var(--teal); font-weight: 600;
    }
    .btn-primary:hover { opacity: 0.85; color: #000; }
    .btn-ghost { background: none; }
    .btn-danger {
      background: rgba(255,138,101,0.12); color: var(--coral);
      border: 1px solid rgba(255,138,101,0.3);
    }
    .btn-danger:hover { background: rgba(255,138,101,0.22); opacity: 1; }

    /* New goal modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 200; display: none; align-items: center; justify-content: center;
    }
    .modal-overlay.open, .modal-overlay[style*="flex"] { display: flex; }
    .modal {
      background: var(--void-elevated); border: 1px solid var(--border-subtle);
      border-radius: 12px; padding: 28px; width: 480px; max-width: 95vw;
    }
    .modal-title {
      font-family: var(--font-display); font-size: 18px; font-weight: 700;
      margin-bottom: 20px; color: var(--text-primary);
    }
    .modal-footer {
      display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px;
    }

    .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .add-btn {
      font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em;
      text-transform: uppercase; padding: 9px 16px; border-radius: 8px;
      border: 1px solid var(--teal); background: var(--teal-subtle);
      color: var(--teal); cursor: pointer; transition: all 0.2s;
    }
    .add-btn:hover { background: var(--teal); color: #000; }

    .milestones-empty {
      font-size: 12px; color: var(--text-tertiary); padding: 8px 2px;
    }
  </style>
</head>

<script src="/admin/js/auth.js?v=2"></script>
<script>
  requireAuth();

  document.getElementById('logout-btn').addEventListener('click', e => {
    e.preventDefault();
    clearToken();
    window.location.href = '/admin/index.html';
  });

  // ---- State ----
  let allGoals = [];
  let activeArea = 'all';
  let activeStatus = 'all';
  let drawerGoalId = null;
  let drawerMilestones = [];

  const AREA_CLASS = {
    work: 'area-teal', growth: 'area-teal',
    health: 'area-coral', life: 'area-coral', finances: 'area-coral',
    relationships: 'area-purple', creative: 'area-purple',
    exploration: 'area-slate'
  };

  function esc(s) {
    return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function fmtDate(d) {
    if (!d) return '';
    const [y, m, day] = d.split('-').map(Number);
    return new Date(y, m - 1, day).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  // ---- Render goals grid ----

  function visibleGoals() {
    return allGoals.filter(g => {
      if (activeArea !== 'all' && g.area !== activeArea) return false;
      if (activeStatus !== 'all' && g.status !== activeStatus) return false;
      return true;
    });
  }

  function renderGrid() {
    const goals = visibleGoals();
    const grid = document.getElementById('goals-grid');

    if (goals.length === 0) {
      grid.innerHTML = '<div class="empty-state">No goals yet. Add your first goal above.</div>';
      return;
    }

    grid.innerHTML = goals.map(g => {
      const areaClass = (g.area && AREA_CLASS[g.area]) || 'area-slate';
      const areaBadge = g.area
        ? `<span class="area-badge ${areaClass}">${esc(g.area)}</span>`
        : '<span></span>';
      const statusBadge = `<span class="status-badge status-${esc(g.status)}">${esc(g.status)}</span>`;
      const targetLine = g.target_date
        ? `<div class="goal-target">Target: ${fmtDate(g.target_date)}</div>`
        : '';
      const total = g.milestone_count || 0;
      const done = g.milestone_done || 0;
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;
      const progressSection = `
        <div class="milestone-progress">
          <div class="milestone-label">${done} / ${total} milestones</div>
          <div class="progress-track">
            <div class="progress-fill" style="width: ${pct}%"></div>
          </div>
        </div>`;

      return `<div class="goal-card" data-id="${g.id}" role="button" tabindex="0" aria-label="${esc(g.title)}">
        <div class="goal-card-top">${areaBadge}${statusBadge}</div>
        <div class="goal-title">${esc(g.title)}</div>
        ${targetLine}
        ${progressSection}
      </div>`;
    }).join('');

    grid.querySelectorAll('.goal-card').forEach(card => {
      card.addEventListener('click', () => openDrawer(Number(card.dataset.id)));
      card.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') openDrawer(Number(card.dataset.id));
      });
    });
  }

  // ---- Filters ----

  document.getElementById('area-filter-bar').addEventListener('click', e => {
    const pill = e.target.closest('.filter-pill');
    if (!pill) return;
    document.querySelectorAll('#area-filter-bar .filter-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    activeArea = pill.dataset.area;
    renderGrid();
  });

  document.getElementById('status-filter-bar').addEventListener('click', e => {
    const pill = e.target.closest('.filter-pill');
    if (!pill) return;
    document.querySelectorAll('#status-filter-bar .filter-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    activeStatus = pill.dataset.status;
    renderGrid();
  });

  // ---- API ----

  async function loadGoals() {
    const data = await apiGet('/api/theo-os/goals');
    allGoals = data || [];
    renderGrid();
  }

  async function loadMilestones(goalId) {
    const data = await apiGet(`/api/theo-os/goals/${goalId}/milestones`);
    drawerMilestones = data || [];
    renderMilestones();
  }

  // ---- New goal modal ----

  const newGoalModal = document.getElementById('new-goal-modal');
  const ngTitle = document.getElementById('ng-title');

  document.getElementById('new-goal-btn').addEventListener('click', () => {
    ngTitle.value = '';
    document.getElementById('ng-area').value = '';
    document.getElementById('ng-status').value = 'active';
    document.getElementById('ng-target').value = '';
    document.getElementById('ng-description').value = '';
    newGoalModal.style.display = 'flex';
    ngTitle.focus();
  });

  document.getElementById('modal-cancel-btn').addEventListener('click', () => {
    newGoalModal.style.display = 'none';
  });

  newGoalModal.addEventListener('click', e => {
    if (e.target === newGoalModal) newGoalModal.style.display = 'none';
  });

  document.getElementById('modal-save-btn').addEventListener('click', async () => {
    const title = ngTitle.value.trim();
    if (!title) { ngTitle.focus(); return; }

    const saveBtn = document.getElementById('modal-save-btn');
    saveBtn.disabled = true;
    saveBtn.textContent = 'Creating...';

    try {
      const created = await apiPost('/api/theo-os/goals', {
        title,
        area: document.getElementById('ng-area').value || null,
        status: document.getElementById('ng-status').value || 'active',
        target_date: document.getElementById('ng-target').value || null,
        description: document.getElementById('ng-description').value.trim() || null,
      });
      if (created) {
        allGoals.unshift({ ...created, milestone_count: 0, milestone_done: 0 });
        renderGrid();
        newGoalModal.style.display = 'none';
      }
    } finally {
      saveBtn.disabled = false;
      saveBtn.textContent = 'Create Goal';
    }
  });

  // ---- Drawer ----

  const drawer = document.getElementById('goal-drawer');
  const backdrop = document.getElementById('drawer-backdrop');

  function openDrawer(id) {
    const goal = allGoals.find(g => g.id === id);
    if (!goal) return;
    drawerGoalId = id;

    document.getElementById('d-title').value = goal.title || '';
    document.getElementById('d-area').value = goal.area || '';
    document.getElementById('d-status').value = goal.status || 'active';
    document.getElementById('d-target').value = goal.target_date || '';
    document.getElementById('d-description').value = goal.description || '';

    drawerMilestones = [];
    renderMilestones();
    loadMilestones(id);

    backdrop.classList.add('open');
    drawer.classList.add('open');
    document.getElementById('d-title').focus();
  }

  function closeDrawer() {
    backdrop.classList.remove('open');
    drawer.classList.remove('open');
    drawerGoalId = null;
    drawerMilestones = [];
  }

  document.getElementById('drawer-close-btn').addEventListener('click', closeDrawer);
  document.getElementById('d-cancel-btn').addEventListener('click', closeDrawer);
  backdrop.addEventListener('click', closeDrawer);

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && drawer.classList.contains('open')) closeDrawer();
    if (e.key === 'Escape' && newGoalModal.style.display === 'flex') newGoalModal.style.display = 'none';
  });

  // ---- Save drawer changes ----

  document.getElementById('d-save-btn').addEventListener('click', async () => {
    if (!drawerGoalId) return;
    const saveBtn = document.getElementById('d-save-btn');
    saveBtn.disabled = true;
    saveBtn.textContent = 'Saving...';

    try {
      const updated = await apiPatch(`/api/theo-os/goals/${drawerGoalId}`, {
        title: document.getElementById('d-title').value.trim(),
        area: document.getElementById('d-area').value || null,
        status: document.getElementById('d-status').value,
        target_date: document.getElementById('d-target').value || null,
        description: document.getElementById('d-description').value.trim() || null,
      });
      if (updated) {
        const idx = allGoals.findIndex(g => g.id === drawerGoalId);
        if (idx !== -1) {
          allGoals[idx] = {
            ...updated,
            milestone_count: allGoals[idx].milestone_count,
            milestone_done: allGoals[idx].milestone_done
          };
        }
        renderGrid();
        closeDrawer();
      }
    } finally {
      saveBtn.disabled = false;
      saveBtn.textContent = 'Save Changes';
    }
  });

  // ---- Delete goal ----

  document.getElementById('d-delete-btn').addEventListener('click', async () => {
    if (!drawerGoalId) return;
    const goal = allGoals.find(g => g.id === drawerGoalId);
    const name = goal ? goal.title : 'this goal';
    if (!confirm(`Delete "${name}" and all its milestones? This cannot be undone.`)) return;
    const id = drawerGoalId;
    closeDrawer();
    const ok = await apiDelete(`/api/theo-os/goals/${id}`);
    if (ok) {
      allGoals = allGoals.filter(g => g.id !== id);
      renderGrid();
    }
  });

  // ---- Milestones render ----

  function renderMilestones() {
    const list = document.getElementById('milestones-list');
    if (drawerMilestones.length === 0) {
      list.innerHTML = '<div class="milestones-empty">No milestones yet.</div>';
      return;
    }
    list.innerHTML = drawerMilestones.map(m => {
      const done = m.status === 'done';
      const dueStr = m.due_date ? `<div class="milestone-due">${fmtDate(m.due_date)}</div>` : '';
      return `<div class="milestone-item${done ? ' done' : ''}" data-id="${m.id}">
        <input type="checkbox" class="milestone-check" data-id="${m.id}" ${done ? 'checked' : ''} aria-label="Mark done">
        <div class="milestone-info">
          <div class="milestone-title">${esc(m.title)}</div>
          ${dueStr}
        </div>
        <button class="milestone-del" data-id="${m.id}" aria-label="Delete milestone">&times;</button>
      </div>`;
    }).join('');

    // Checkbox toggles
    list.querySelectorAll('.milestone-check').forEach(cb => {
      cb.addEventListener('change', async () => {
        const id = Number(cb.dataset.id);
        const newStatus = cb.checked ? 'done' : 'pending';
        const updated = await apiPatch(`/api/theo-os/milestones/${id}`, { status: newStatus });
        if (updated) {
          const m = drawerMilestones.find(x => x.id === id);
          if (m) m.status = newStatus;
          refreshGoalCounts();
          renderMilestones();
        } else {
          cb.checked = !cb.checked;
        }
      });
    });

    // Delete milestone
    list.querySelectorAll('.milestone-del').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = Number(btn.dataset.id);
        const ok = await apiDelete(`/api/theo-os/milestones/${id}`);
        if (ok) {
          drawerMilestones = drawerMilestones.filter(m => m.id !== id);
          refreshGoalCounts();
          renderMilestones();
        }
      });
    });
  }

  // ---- Add milestone ----

  document.getElementById('m-add-btn').addEventListener('click', async () => {
    const title = document.getElementById('m-new-title').value.trim();
    if (!title || !drawerGoalId) return;
    const due_date = document.getElementById('m-new-date').value || null;

    const btn = document.getElementById('m-add-btn');
    btn.disabled = true;

    try {
      const created = await apiPost(`/api/theo-os/goals/${drawerGoalId}/milestones`, { title, due_date });
      if (created) {
        drawerMilestones.push(created);
        drawerMilestones.sort((a, b) => {
          if (!a.due_date && !b.due_date) return 0;
          if (!a.due_date) return 1;
          if (!b.due_date) return -1;
          return a.due_date.localeCompare(b.due_date);
        });
        document.getElementById('m-new-title').value = '';
        document.getElementById('m-new-date').value = '';
        refreshGoalCounts();
        renderMilestones();
      }
    } finally {
      btn.disabled = false;
    }
  });

  document.getElementById('m-new-title').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('m-add-btn').click();
  });

  // ---- Update goal counts in allGoals array ----

  function refreshGoalCounts() {
    if (!drawerGoalId) return;
    const idx = allGoals.findIndex(g => g.id === drawerGoalId);
    if (idx === -1) return;
    allGoals[idx].milestone_count = drawerMilestones.length;
    allGoals[idx].milestone_done = drawerMilestones.filter(m => m.status === 'done').length;
    renderGrid();
  }

  // ---- Init ----
  loadGoals();

  // Cmd+K capture overlay
  (function() {
    const overlay = document.getElementById('capture-overlay');
    const captureInput = document.getElementById('capture-input');
    const captureHint = document.getElementById('capture-hint');
    function openCapture() {
      overlay.classList.add('open');
      captureInput.value = '';
      captureHint.textContent = '↵ to capture · Esc to close';
      captureInput.focus();
    }
    function closeCapture() { overlay.classList.remove('open'); captureInput.value = ''; }
    document.addEventListener('keydown', e => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); overlay.classList.contains('open') ? closeCapture() : openCapture(); }
      if (e.key === 'Escape' && overlay.classList.contains('open')) closeCapture();
    });
    overlay.addEventListener('click', e => { if (e.target === overlay) closeCapture(); });
    captureInput.addEventListener('keydown', async e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        const text = captureInput.value.trim();
        if (!text) return;
        captureHint.textContent = 'Saving...';
        try {
          const data = await apiPost('/api/theo-os/capture', { text });
          captureHint.textContent = (data && data.message) ? data.message : 'Captured.';
          captureInput.value = '';
          setTimeout(() => closeCapture(), 1500);
        } catch { captureHint.textContent = 'Failed to save — check connection.'; }
      }
    });
  })();

</script>

<!-- Cmd+K capture overlay -->
<div class="capture-overlay" id="capture-overlay">
  <div class="capture-box">
    <textarea class="capture-input" id="capture-input"
      placeholder="Capture anything — task, goal, idea, person, reminder, restaurant..." rows="2"></textarea>
    <div class="capture-hint" id="capture-hint">↵ to capture · Esc to close</div>
  </div>
</div>
</body>
</html>
